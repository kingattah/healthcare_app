<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doctor Dashboard | CareOps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <div id="navRoot"></div>
    <main class="container dashboard-shell">
      <section class="dashboard-header">
        <div>
          <span class="eyebrow">Doctor Console</span>
          <h1 class="dashboard-title">Clinical Schedule</h1>
          <p class="dashboard-subtitle">Set your availability and update patient appointment outcomes in real time.</p>
        </div>
        <div class="dashboard-header-actions">
          <div class="surface-card-soft p-3 dashboard-action-card">
            <p class="dashboard-action-title">Shift support</p>
            <p class="dashboard-action-sub">Direct help for scheduling changes or escalations.</p>
            <a class="btn btn-outline-primary btn-sm w-100" href="mailto:support@careops.io">Contact support</a>
          </div>
        </div>
      </section>
      <div class="row g-4">
        <div class="col-lg-4">
          <div class="surface-card p-4">
            <h3 class="panel-title mb-3">Set Availability</h3>
            <form id="availabilityForm">
              <div class="mb-3">
                <label class="form-label">Date</label>
                <input class="form-control" type="date" name="available_date" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Start time</label>
                <input class="form-control" type="time" name="start_time" required />
              </div>
              <div class="mb-3">
                <label class="form-label">End time</label>
                <input class="form-control" type="time" name="end_time" required />
              </div>
              <button class="btn btn-primary w-100" type="submit">Save Availability</button>
            </form>
          </div>
        </div>
        <div class="col-lg-8">
          <div class="surface-card p-4">
            <h3 class="panel-title mb-3">Assigned Appointments</h3>
            <div class="table-responsive table-card">
              <table class="table align-middle">
                <thead>
                  <tr>
                    <th>Patient</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="doctorAppointments"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script type="module" src="../js/pages/doctorPage.js"></script>
  </body>
</html>
