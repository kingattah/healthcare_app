<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patient Dashboard | CareOps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <div id="navRoot"></div>
    <main class="container dashboard-shell">
      <section class="dashboard-header">
        <div>
          <span class="eyebrow">Patient Workspace</span>
          <h1 class="dashboard-title">Appointments</h1>
          <p class="dashboard-subtitle">Manage your consultations, choose available doctor slots, and track every booking in one place.</p>
        </div>
        <div class="dashboard-header-actions">
          <div class="surface-card-soft p-3 dashboard-action-card">
            <p class="dashboard-action-title">Concierge support</p>
            <p class="dashboard-action-sub">Priority help for reschedules and reminders.</p>
            <a class="btn btn-outline-primary btn-sm w-100" href="mailto:support@careops.io">Message support</a>
          </div>
        </div>
      </section>
      <div class="row g-4">
        <div class="col-lg-5">
          <div class="surface-card p-4">
            <h3 class="panel-title mb-3">Book Appointment</h3>
            <div class="mb-3">
              <label class="form-label">Department</label>
              <select id="departmentSelect" class="form-select"></select>
            </div>
            <div class="mb-3">
              <label class="form-label">Doctor</label>
              <select id="doctorSelect" class="form-select"></select>
            </div>
            <div class="mb-3">
              <label class="form-label">Date</label>
              <input id="dateInput" type="date" class="form-control" />
            </div>
            <label class="form-label">Available Slots</label>
            <div id="slotList" class="calendar-grid mb-3"></div>
            <button id="bookBtn" class="btn btn-primary w-100">Confirm Booking</button>
          </div>
        </div>
        <div class="col-lg-7">
          <div class="surface-card p-4">
            <h3 class="panel-title mb-3">Appointment History</h3>
            <div class="table-responsive table-card">
              <table class="table align-middle">
                <thead>
                  <tr>
                    <th>Doctor</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Status</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody id="historyTable"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/config.js"></script>
    <script type="module" src="/js/pages/patientPage.js"></script>
  </body>
</html>
